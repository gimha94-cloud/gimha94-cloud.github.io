    <div class="poem">꿈을 이뤘다.

도달했다.
그곳에 섰다.
해냈다.

그런데

다음 날 아침
눈을 떴을 때

더 이상
꿈꿀 것이
없었다.

목표가 사라진 자리에
텅 빈 하루가 남았다.</div>
