<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>당신의 소원</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .wish-title {
      font-size: 1.3rem;
      font-weight: 400;
      color: #e8e8f0;
      margin-bottom: 0.5rem;
      letter-spacing: 0.04em;
    }
    .wish-word {
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.06em;
      margin-bottom: 2.5rem;
      display: block;
    }
  </style>
</head>
<body>
  <main class="page">
    <img class="unit-image" src="https://picsum.photos/seed/unknown/600/180" alt="소원">
    <div class="sys-label">당신의 소원</div>

    <div class="poem" id="wish-poem"></div>

    <nav class="choices">
      <a class="choice" href="unknown-result.html">소원 빌기</a>
    </nav>
  </main>

  <script>
    const wish = sessionStorage.getItem('wish') || '알 수 없는 무언가';
    document.getElementById('wish-poem').textContent =
      wish + '.\n\n그것이 이루어지길 원했다.\n무슨 대가가 따르든.';
  </script>
</body>
</html>
