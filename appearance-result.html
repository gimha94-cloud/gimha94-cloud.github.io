    <div class="sys-label">외모의 결과</div>
    <div class="poem">당신은 달라졌다.

사람들은 돌아봤다.
멈춰 섰다.
미소를 보냈다.

하지만

거울 앞에서
당신은 여전히
누군가를 찾고 있었다.

그 얼굴이
당신인지
아닌지
알 수 없었다.</div>
