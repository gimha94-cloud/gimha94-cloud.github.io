    <div class="poem">조용해졌다.

걱정도
분노도
슬픔도
사라졌다.

고요했다.

하지만

설렘도
기대도
사랑도
함께 사라졌다.

감정이 없는 평화는
살아있는 것이 아니었다.</div>
