    <div class="sys-label">용기의 결과</div>
    <div class="poem">두렵지 않았다.

말했다.
움직였다.
뛰어들었다.

그리고

실패했다.

두려움이 없었기에
멈추지 않았고
멈추지 않았기에
더 깊이 다쳤다.

용기는
상처를 없애주지 않는다.
그냥 먼저 가게 할 뿐이다.</div>
