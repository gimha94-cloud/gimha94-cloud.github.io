    <div class="poem">그 사람이 생겼다.

당신의 말을 들었다.
당신의 침묵도 들었다.
당신이 숨긴 것도
어느 정도는 알았다.

하지만

이해받는다는 것은
때로
더 무거운 일이었다.

숨을 곳이
사라졌다.</div>
