    <div class="ending-num">ENDING 01</div>
    <div class="ending-name">삭제</div>

    <div class="poem">당신은 모든 소원을 지웠다.

사랑도
돈도
인기도
복수도
자유도

사라졌다.

당신의 손에는
아무것도 남지 않았다.

하지만

처음으로
스스로 걸을 수 있었다.</div>
