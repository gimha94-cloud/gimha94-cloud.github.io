    <div class="poem">잊었다.

그 사람의 얼굴을.
그 말을.
그 날을.

가벼워졌다.

그런데

왜 울고 싶은지
이유를 알 수 없었다.

슬픔은 남아있었다.
기억만 사라졌을 뿐.</div>
