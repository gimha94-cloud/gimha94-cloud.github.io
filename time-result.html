    <div class="sys-label">시간의 결과</div>
    <div class="poem">당신은 그때로 돌아갔다.

모든 것이 그대로였다.
그 사람도
그 장소도
그 감정도.

당신은 이번엔
다르게 행동했다.

하지만

결과는
똑같았다.

어쩌면
문제는 그때가 아니었다.</div>
