    <div class="poem">사람들이 생겼다.

항상 곁에 있었다.
연락이 끊이지 않았다.
혼자인 시간이 사라졌다.

그런데

혼자이고 싶을 때
혼자일 수 없었다.

외로움은 사라졌지만
나만의 시간도
함께 사라졌다.</div>
