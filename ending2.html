    <div class="ending-num">ENDING 02</div>

    <div class="poem">당신은 모든 소원을 유지했다.

사랑을 얻었다.
돈을 얻었다.
인기를 얻었다.
복수에 성공했다.
자유도 얻었다.

그리고

<span class="last-line">당신 자신을 잃었다.</span></div>
