    <div class="poem">가족은 웃었다.
다투지 않았다.
상처 주지 않았다.

모든 것이
부드럽게 흘렀다.

그런데

그 웃음이
진짜인지
소원 때문인지

당신은
끝내 알 수 없었다.</div>
